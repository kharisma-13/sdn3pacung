backend:
  name: github
  repo: kharisma-13/sdn3pacung
  branch: main
  base_url: https://sdn3pacung.kadekdiankharisma.workers.dev/
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "berita"
    label: "Berita & Pengumuman"
    folder: "_posts/berita"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Tanggal", name: "date", widget: "datetime"}
      - {label: "Penulis", name: "author", widget: "string"}
      - {label: "Isi Berita", name: "body", widget: "markdown"}

  - name: "pengaturan"
    label: "Konten Website"
    delete: false
    editor:
      preview: false
    files:
      - name: "profil_sekolah"
        label: "Profil & Informasi Sekolah"
        file: "data-sekolah.json"
        fields:
          - {label: "Judul Utama Beranda", name: "title", widget: "string"}
          - {label: "Slogan / Teks Sambutan", name: "subtitle", widget: "text"}
          - {label: "Foto Banner Utama", name: "banner_image", widget: "image"}
          
          # Bagian Visi & Misi Sekolah
          - {label: "Visi Sekolah", name: "visi", widget: "text"}
          - label: "Misi Sekolah"
            name: "misi"
            widget: "list"
            summary: "{{fields.misi}}"
            field: {label: "Butir Misi", name: "butir", widget: "string"}

          # Bagian Galeri Foto Sekolah
          - label: "Galeri Foto"
            name: "galeri"
            widget: "list"
            summary: "{{fields.keterangan}}"
            fields:
              - {label: "Foto Kegiatan", name: "gambar", widget: "image"}
              - {label: "Keterangan Foto", name: "keterangan", widget: "string"}